<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>What-eat?</title>
  <meta name="description" content="Brzo odluči što naručiti u fast foodu." />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0D0B08" />

  <!-- iOS: standalone/fullscreen ponašanje + ikona na početnom zaslonu -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="What-eat?" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="icon" href="./favicon.ico" sizes="any" />
  <link rel="icon" href="./icons/icon-192.png" type="image/png" />

  <style>
    :root {
      --bg-1: #16120C;
      --bg-2: #0B0907;
      --text: #F5F3EF;
      --muted: #968F85;
      --card: rgba(255, 255, 255, 0.045);
      --card-border: rgba(255, 255, 255, 0.09);
      --accent-1: #FFB02E;
      --accent-2: #FF6B35;
      --radius: 30px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
              "Segoe UI", system-ui, "Inter", "Roboto", "Helvetica Neue", sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(120% 80% at 50% -10%, #241D14 0%, transparent 55%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      background-attachment: fixed;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      text-align: center;
      padding:
        calc(env(safe-area-inset-top) + 42px)
        calc(env(safe-area-inset-right) + 24px)
        calc(env(safe-area-inset-bottom) + 34px)
        calc(env(safe-area-inset-left) + 24px);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      overflow: hidden;
    }

    /* — Zaglavlje — */
    header { display: flex; flex-direction: column; gap: 10px; }

    .eyebrow {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      font-size: clamp(34px, 11vw, 46px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    h1 .q { color: var(--accent-1); }

    /* — Sredina: kartica s jelom — */
    main {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(26px, 6vh, 48px);
    }

    .stage { display: flex; flex-direction: column; align-items: center; gap: 22px; }

    .card {
      width: min(74vw, 300px);
      aspect-ratio: 1 / 1;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.06) inset,
        0 30px 60px -28px rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: grid;
      place-items: center;
      overflow: hidden;
      position: relative;
    }

    .card img {
      width: 78%;
      height: 78%;
      object-fit: contain;
      transition: transform 0.42s cubic-bezier(0.22, 1.4, 0.36, 1),
                  opacity 0.3s ease, filter 0.3s ease;
    }

    /* Tekstualni fallback — vidljiv dok PNG slike još nisu dodane, ili ako ne učitaju. */
    .fallback {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      padding: 18px;
      font-size: clamp(20px, 6vw, 28px);
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .card.is-fallback .fallback { display: grid; }
    .card.is-fallback img { opacity: 0; }

    /* Stanje vrtnje */
    .card.is-spinning img { filter: blur(1.4px); transform: scale(0.95); opacity: 0.9; }
    .card.is-spinning .fallback { opacity: 0.85; }
    .card.landed img { animation: pop 0.46s cubic-bezier(0.22, 1.4, 0.36, 1); }

    @keyframes pop {
      0% { transform: scale(0.88); }
      55% { transform: scale(1.07); }
      100% { transform: scale(1); }
    }

    .result {
      min-height: 1.4em;
      font-size: clamp(19px, 5.5vw, 23px);
      font-weight: 600;
      letter-spacing: -0.01em;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .result.show { opacity: 1; transform: translateY(0); }

    /* — Gumb — */
    .spin {
      font-family: var(--font);
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #20160A;
      border: none;
      cursor: pointer;
      padding: 18px 0;
      width: min(74vw, 300px);
      min-height: 56px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      box-shadow: 0 12px 30px -10px rgba(255, 120, 40, 0.55);
      transition: transform 0.12s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }
    .spin:hover { box-shadow: 0 16px 36px -10px rgba(255, 120, 40, 0.65); }
    .spin:active { transform: scale(0.97); }
    .spin:focus-visible { outline: 3px solid rgba(255, 176, 46, 0.6); outline-offset: 3px; }
    .spin:disabled { opacity: 0.6; cursor: default; }

    /* — Footer / install hint — */
    footer { min-height: 22px; }
    .hint {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
      display: none;
    }
    .hint.show { display: block; }
    .install-btn {
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      color: var(--accent-1);
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 10px;
      display: none;
    }
    .install-btn.show { display: inline-block; }

    @media (prefers-reduced-motion: reduce) {
      .card img, .result, .spin { transition: none; }
      .card.landed img { animation: none; }
      .card.is-spinning img { filter: none; transform: none; }
    }
  </style>
</head>
<body>
  <header>
    <p class="eyebrow">Ne znaš što jesti?</p>
    <h1>What-eat<span class="q">?</span></h1>
  </header>

  <main>
    <div class="stage">
      <div class="card" id="card">
        <img id="food" alt="Odabrano jelo" />
        <span class="fallback" id="fallback"></span>
      </div>
      <p class="result" id="result" aria-live="polite"></p>
    </div>

    <button class="spin" id="spin">Zavrti</button>
  </main>

  <footer>
    <p class="hint" id="hint">Za instalaciju: <strong>Podijeli</strong> &rsaquo; <strong>Dodaj na početni zaslon</strong></p>
    <button class="install-btn" id="install">Instaliraj aplikaciju</button>
  </footer>

  <script>
    // — Popis jela. Stavi PNG slike u mapu img/ s točno ovim nazivima. —
    const DISHES = [
      { name: "Pizza",         slug: "pizza" },
      { name: "Pomfrit",       slug: "pomfrit" },
      { name: "Burger",        slug: "burger" },
      { name: "Hot dog",       slug: "hot-dog" },
      { name: "Topli sendvič", slug: "topli-sendvic" },
      { name: "Kebab",         slug: "kebab" },
      { name: "Ćevapi",        slug: "cevapi" }
    ];

    const card     = document.getElementById("card");
    const foodImg  = document.getElementById("food");
    const fallback = document.getElementById("fallback");
    const result   = document.getElementById("result");
    const spinBtn  = document.getElementById("spin");

    const SPIN_MS = 1000;            // trajanje vrtnje
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    let spinning = false;
    let currentIndex = 0;

    function vibrate(ms) {
      if ("vibrate" in navigator) {
        try { navigator.vibrate(ms); } catch (e) {}
      }
    }

    // Prikaz jela; ako PNG ne učita, prikazuje se naziv kao fallback.
    function showDish(index) {
      const dish = DISHES[index];
      fallback.textContent = dish.name;
      foodImg.alt = dish.name;
      card.classList.remove("is-fallback");
      foodImg.src = "img/" + dish.slug + ".png";
    }
    foodImg.addEventListener("error", () => card.classList.add("is-fallback"));
    foodImg.addEventListener("load", () => card.classList.remove("is-fallback"));

    function randomIndex(exclude) {
      let i;
      do { i = Math.floor(Math.random() * DISHES.length); }
      while (DISHES.length > 1 && i === exclude);
      return i;
    }

    function finish(index) {
      currentIndex = index;
      showDish(index);
      spinning = false;
      spinBtn.disabled = false;
      card.classList.remove("is-spinning");
      card.classList.remove("landed");
      void card.offsetWidth;          // restart animacije
      card.classList.add("landed");
      result.textContent = DISHES[index].name;
      result.classList.add("show");
      vibrate([20, 40, 30]);          // kratki "landing" osjećaj
    }

    function spin() {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      vibrate(50);                    // haptika na klik (Android)
      result.classList.remove("show");

      if (reduceMotion) {             // pristupačnost: bez treperenja
        finish(randomIndex(currentIndex));
        return;
      }

      card.classList.add("is-spinning");
      const start = performance.now();
      let lastIndex = currentIndex;
      let lastSwap = 0;

      function tick(now) {
        const p = Math.min((now - start) / SPIN_MS, 1);   // 0 → 1
        const interval = 55 + Math.pow(p, 2.2) * 200;     // ease-out: usporava
        if (now - lastSwap >= interval) {
          lastSwap = now;
          lastIndex = randomIndex(lastIndex);
          showDish(lastIndex);
        }
        if (p < 1) {
          requestAnimationFrame(tick);
        } else {
          finish(lastIndex);
        }
      }
      requestAnimationFrame(tick);
    }

    spinBtn.addEventListener("click", spin);

    // Početno stanje
    showDish(currentIndex);

    // — Instalacija (Android / Windows / Chrome) —
    const installBtn = document.getElementById("install");
    let deferredPrompt = null;
    const standalone =
      window.matchMedia("(display-mode: standalone)").matches ||
      window.matchMedia("(display-mode: fullscreen)").matches ||
      window.navigator.standalone === true;

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.classList.add("show");
    });
    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.classList.remove("show");
    });
    window.addEventListener("appinstalled", () => installBtn.classList.remove("show"));

    // iOS Safari nema prompt → pokaži kratku uputu (samo ako još nije instalirano).
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    if (isIOS && !standalone) {
      document.getElementById("hint").classList.add("show");
    }

    // — Service worker (relativna putanja → radi i u podmapi na GitHub Pages) —
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
